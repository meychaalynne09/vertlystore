<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viu - vertlystore</title>
      <link rel="shortcut icon" type="x-icon" href="foto/meypict.jpg">
    <style>
        body{
            background-color: #fff0f6;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            color: #ff3399;
            margin: 0;
            padding: 0;
        }
        .container{
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem;
        }
        .gamelogo{
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 20px;
            border: 3px solid #ff99cc;
            box-shadow: 0 0 15px pink;
        }
        .diamondbox a{
            text-decoration: none;
        }
        h1{
            margin-top: 1rem;
            font-size: 1.8rem;
            color: #ff66b3;
        }
        .diamondlist{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
            gap: 15px;
            margin-top: 2rem;
        }
    
        .diamondbox{
            background-color: #ffe6f0;
            border: 2px solid #ff99cc;
            border-radius: 15px;
            padding: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .diamondbox:hover{
            transform: scale(1.05);
            box-shadow: 0 0 15px pink;
        }
        .diamondbox p{
            margin: 0.5rem 0 0;
            font-weight: bold;
            color: #ff3399
        }
        .buybtn{
            background-color: #ff66b3;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            margin-top: 2rem;
            cursor: pointer;
            font-size: 1rem;
            transition:  all 0.2s;
        }
        .buybtn:hover{
            background-color: #ff99cc;
            box-shadow: 0 0 15px pink;
        }

        a.backhome{
            display: inline-block;
            color: hsl(0, 0%, 100%);
            text-decoration: none;
            font-size: 0.9rem;
        }
        a.backhome:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <br><br>
    <div class="container">
        <img src="foto/viu.jpeg" alt="Mobile Legends" class="gamelogo"/>
        <h1>Viu</h1>
        <p>Premium, Private Acc, Full Garansi Replace Acc</p>
        <div class="diamondlist">
            
            <div class="diamondbox">
                <p>1 tahun</p>
                <p>Rp 10p</p>     
            </a>
            </div>
            
            
            
            <div class="diamondbox">
                <p>lifetime</p>
                <p>Rp 50p</p>     
            </a>
        </div>
        <div class="diamondbox">
            <p>bulk 50 acc lifetime</p>
            <p>Rp 150p</p>     
        </a>
        </div>
        <div class="diamondbox">
            <p>bulk 100 acc lifetime</p>
            <p>Rp 250p</p>     
        </a>
        </div>
        
            
           
         
            
            </div>
        </div><br>

<button  onclick="location.href='pricelist.html'" class="buybtn"><a class="backhome">Kembali Ke Halaman Utama</a></button>
        <br>
        <br><br>
    </div>
</body>
</html>
