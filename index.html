<style>
    body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #ffeaf4;
}

/* HEADER */
.profile-header {
    position: relative;
    width: 100%;
    height: 240px;
}

/* COVER */
.cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: linear-gradient(135deg, #ff9ecb, #ffc3e0);
}

/* PROFILE */
.profile-pic {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translate(-50%, 50%);
}

.profile-pic img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 5px solid white;
    object-fit: cover;
    background: #ddd;
    transition: 0.3s;
}

.profile-pic img:hover {
    transform: scale(1.05);
}

/* CAMERA ICON */
.camera {
    position: absolute;
    background: #ff69b4;
    color: white;
    border-radius: 50%;
    padding: 6px;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.camera:hover {
    transform: scale(1.1);
}

/* POSITIONS */
.cover-cam {
    right: 15px;
    bottom: 15px;
}

.profile-cam {
    right: 0;
    bottom: 10px;
}

/* TEXT */
.info-text {
    text-align: center;
    margin-top: 80px;
    font-size: 14px;
    color: #555;
}

.info-text span {
    color: #ff4da6;
    font-weight: bold;
}

/* MENU */
.menu {
    background: white;
    margin-top: 15px;
    padding: 10px 0;
    border-radius: 15px 15px 0 0;
}

/* TITLE */
.menu-title {
    font-weight: bold;
    padding: 10px 15px;
    color: #ff4da6;
}

/* ITEM */
.menu-item {
    display: flex;
    align-items: center;
    padding: 13px 15px;
    text-decoration: none;
    color: #333;
    border-top: 1px solid #f1f1f1;
    transition: 0.2s;
}

.menu-item span {
    margin-left: 10px;
}

/* HOVER ANIMATION */
.menu-item:hover {
    background: #fff0f7;
    transform: translateX(5px);
}


 .section-title{
    color:rgb(135, 22, 22);
    margin:0 0 0.6rem 0;
    font-size:1.1rem;
    text-align: center;
  }
.socials{

    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
    margin:1.2rem 0 2rem 0;
  }
  .social-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:9px 14px;
    text-decoration:none;
    background:var(--pink-2);
    color:rgb(135, 22, 22);
    font-weight:600;
    border-radius:12px;
    box-shadow:0 6px 16px rgba(214,51,132,0.15);
    transition: transform .18s ease, background .18s;
  }
  .social-btn img{width:20px;height:20px;display:block}
  .social-btn:hover{transform:translateY(-3px);background:var(--accent)}
 footer{

   .marquee {

    white-space: nowrap;
    background: #ff4da6;
    color: white;
    padding: 10px 0;
}

.marquee-text {
    display: inline-block;
    padding-left: 100%;
    animation: jalan 10s linear infinite;
}

/* ANIMATION */
@keyframes jalan {
    0% {
        transform: translateX(0);
    }
    100% {
        transform: translateX(-100%);
    }
}
