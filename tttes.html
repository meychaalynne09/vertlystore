<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VertlyStore</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#ffe6f0;
}

/* HEADER */
.header{
  background:#ff66a3;
  padding:15px;
  text-align:center;
  color:white;
  font-weight:bold;
  font-size:18px;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

/* SEARCH */
.search-box{
  margin:15px;
}

.search-box input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  outline:none;
}

/* CONTAINER */
.container{
  padding:10px;
}

/* CARD */
.card{
  display:flex;
  align-items:center;
  background:white;
  padding:10px;
  border-radius:15px;
  margin-bottom:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* IMAGE */
.card img{
  width:60px;
  height:60px;
  border-radius:12px;
  margin-right:10px;
}

/* INFO */
.info{
  flex:1;
}

.title{
  font-weight:bold;
}

.desc{
  font-size:12px;
  color:gray;
}

.price{
  color:#ff3399;
  font-weight:bold;
}

/* BUTTON */
.btn{
  background:#ff66a3;
  color:white;
  padding:6px 10px;
  border:none;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
}

/* RESPONSIVE */
@media (max-width:480px){
  .title{
    font-size:14px;
  }
  .price{
    font-size:13px;
  }
}

 .buybtn{
            background-color: #ff66b3;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            margin-top: 2rem;
            cursor: pointer;
            font-size: 1rem;
            transition:  all 0.2s;
        }
        .buybtn:hover{
            background-color: #ff99cc;
            box-shadow: 0 0 15px pink;
        }
</style>
</head>

<body>

<div class="header">
  💗 VertlyStore - APK Premium
</div>

<div class="search-box">
  <input type="text" placeholder="Cari APK premium...">
</div>

<div class="container">

  <div class="card">
    <img src="foto/am.jpeg">
    <div class="info">
      <div class="title">Capcut Private - 7 Hari</div>
      <div class="desc">Stok 126</div>
      <div class="price">Rp 360</div>
    </div>
    <!-- <button class="btn">Order</button> -->
  </div>

  <div class="card">
    <img src="foto/am.jpeg">
    <div class="info">
      <div class="title">Capcut Sharing - 1 Bulan</div>
      <div class="desc">Stok 127</div>
      <div class="price">Rp 800</div>
    </div>
    <!-- <button class="btn">Order</button> -->
  </div>

  <div class="card">
    <img src="foto/am.jpeg">
    <div class="info">
      <div class="title">Capcut Private - 1 Bulan</div>
      <div class="desc">Stok 183</div>
      <div class="price">Rp 2.500</div>
    </div>
    <!-- <button class="btn">Order</button> -->
  </div>

</div>
<center>
<button  onclick="location.href='pricelist.html'" class="buybtn"><a class="backhome">Kembali</a></button>
</center>

</body>
</html>
